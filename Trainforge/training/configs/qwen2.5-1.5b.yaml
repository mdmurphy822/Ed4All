# Wave 90 — default training config for the Qwen2.5-1.5B base.
# Loaded by ``Trainforge.training.configs.load_config("qwen2.5-1.5b")``.
# Course-level overrides may override any field; see TrainingConfig.

base_model: qwen2.5-1.5b
learning_rate: 2.0e-4
epochs: 3
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
max_seq_length: 2048
batch_size: 1
gradient_accumulation_steps: 4
warmup_ratio: 0.03
weight_decay: 0.01
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
use_4bit: true
min_dpo_pairs: 50
dpo_preference_filter: editorial_or_misconception
dpo_fail_hard: true
seed: 42
