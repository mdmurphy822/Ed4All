[pytest]
# Use importlib import mode so tests with duplicate filenames across
# directories (e.g., DART/tests/test_converter.py vs other test_converter.py)
# don't collide on sys.modules. Equivalent to the --import-mode=importlib CLI
# flag. The previous `importmode` key was silently ignored by pytest.
addopts = --import-mode=importlib -v --tb=short --strict-markers

testpaths =
    tests
    Courseforge/scripts/tests
    Courseforge/tests
    lib/tests
    MCP/tests
    DART/tests
    Trainforge/tests
    LibV2/tests
    cli/tests
    schemas/tests
    scripts/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Phase 8 Subtask 8: enable pytest-asyncio's auto mode so
# @pytest.mark.asyncio decorations trigger without per-test fixture
# wiring. Pairs with the pytest-asyncio default-dep promotion in
# pyproject.toml. The asyncio marker is registered below so the
# --strict-markers flag (set on addopts above) accepts it.
asyncio_mode = auto

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (filesystem access)
    security: Security-critical tests (path validation, injection prevention)
    accessibility: WCAG 2.2 AA compliance tests
    imscc: IMSCC packaging tests
    slow: Tests > 5 seconds
    dart: DART conversion tests
    mcp: MCP server tests
    asyncio: marks tests as async (managed by pytest-asyncio)

filterwarnings =
    ignore::DeprecationWarning

minversion = 7.0
