[pytest]
testpaths =
    Courseforge/scripts/tests
    lib/tests
    MCP/tests
    DART/tests
    Trainforge/tests
    LibV2/tests
    orchestrator/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short --strict-markers

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (filesystem access)
    security: Security-critical tests (path validation, injection prevention)
    accessibility: WCAG 2.2 AA compliance tests
    imscc: IMSCC packaging tests
    slow: Tests > 5 seconds
    dart: DART conversion tests
    mcp: MCP server tests

filterwarnings =
    ignore::DeprecationWarning

minversion = 7.0
