# Digital Pedagogy Knowledge Framework
# Used for gap analysis against LibV2 content
# Version 1.0.0

version: "1.0.0"
description: "Comprehensive digital pedagogy framework for knowledge gap analysis"
target_domain: "educational-technology"

# Coverage thresholds
thresholds:
  excellent: 0.8
  good: 0.6
  partial: 0.4
  minimal: 0.2

domains:
  # ==========================================================================
  # TIER 1: FOUNDATIONAL LEARNING THEORIES
  # ==========================================================================
  foundational_theories:
    name: "Foundational Learning Theories"
    priority: 1
    description: "Core theories of how people learn"
    topics:
      constructivism:
        name: "Constructivism"
        description: "Learning through active construction of knowledge"
        subtopics:
          - piaget_cognitive_development
          - vygotsky_social_constructivism
          - zone_of_proximal_development
          - scaffolding
          - active_learning
          - discovery_learning
        coverage_required: high
        search_terms:
          - "constructivism"
          - "Piaget"
          - "Vygotsky"
          - "zone of proximal development"
          - "scaffolding"

      connectivism:
        name: "Connectivism"
        description: "Digital age learning theory"
        subtopics:
          - networked_learning
          - digital_age_learning
          - siemens_downes_theory
          - learning_networks
          - distributed_knowledge
        coverage_required: high
        search_terms:
          - "connectivism"
          - "networked learning"
          - "Siemens"
          - "digital age learning"

      behaviorism:
        name: "Behaviorism"
        description: "Learning through stimulus-response"
        subtopics:
          - operant_conditioning
          - reinforcement_schedules
          - programmed_instruction
          - skinner
          - stimulus_response
        coverage_required: medium
        gap_status: minor
        search_terms:
          - "behaviorism"
          - "operant conditioning"
          - "reinforcement"
          - "Skinner"

      cognitivism:
        name: "Cognitivism"
        description: "Information processing model of learning"
        subtopics:
          - information_processing
          - schema_theory
          - cognitive_architecture
          - mental_models
          - knowledge_structures
        coverage_required: high
        search_terms:
          - "cognitivism"
          - "information processing"
          - "schema theory"
          - "mental models"

      cognitive_load_theory:
        name: "Cognitive Load Theory"
        description: "Managing mental effort in learning"
        subtopics:
          - intrinsic_load
          - extraneous_load
          - germane_load
          - working_memory_limitations
          - split_attention_effect
          - redundancy_effect
        coverage_required: high
        search_terms:
          - "cognitive load"
          - "working memory"
          - "Sweller"
          - "split attention"

  # ==========================================================================
  # TIER 2: INSTRUCTIONAL DESIGN MODELS
  # ==========================================================================
  instructional_design:
    name: "Instructional Design Models"
    priority: 1
    description: "Systematic approaches to designing instruction"
    topics:
      backward_design:
        name: "Understanding by Design (UbD)"
        description: "Wiggins & McTighe's backward design approach"
        subtopics:
          - wiggins_mctighe
          - enduring_understandings
          - essential_questions
          - assessment_evidence
          - stage_1_desired_results
          - stage_2_evidence
          - stage_3_learning_plan
        coverage_required: high
        search_terms:
          - "Understanding by Design"
          - "UbD"
          - "backward design"
          - "Wiggins"
          - "McTighe"

      addie:
        name: "ADDIE Model"
        description: "Classic instructional design process"
        subtopics:
          - analysis_phase
          - design_phase
          - development_phase
          - implementation_phase
          - evaluation_phase
        coverage_required: high
        gap_status: minor
        search_terms:
          - "ADDIE"
          - "instructional design process"

      sam:
        name: "SAM (Successive Approximation Model)"
        description: "Agile instructional design"
        subtopics:
          - rapid_prototyping
          - iterative_design
          - savvy_start
          - preparation_phase
          - iterative_development
        coverage_required: high
        search_terms:
          - "SAM model"
          - "Successive Approximation"
          - "rapid prototyping"

      dick_carey:
        name: "Dick & Carey Systematic Design"
        description: "Systems approach to instructional design"
        subtopics:
          - instructional_goals
          - learner_analysis
          - performance_objectives
          - criterion_referenced_tests
          - instructional_strategies
        coverage_required: medium
        search_terms:
          - "Dick and Carey"
          - "systematic design"
          - "instructional goals"

      gagnes_events:
        name: "Gagne's Nine Events of Instruction"
        description: "Sequence of instructional events"
        subtopics:
          - gain_attention
          - inform_objectives
          - stimulate_recall
          - present_content
          - provide_guidance
          - elicit_performance
          - provide_feedback
          - assess_performance
          - enhance_retention
        coverage_required: high
        search_terms:
          - "Gagne"
          - "nine events"
          - "conditions of learning"

      merrills_principles:
        name: "Merrill's First Principles of Instruction"
        description: "Problem-centered instructional principles"
        subtopics:
          - problem_centered
          - activation_principle
          - demonstration_principle
          - application_principle
          - integration_principle
        coverage_required: high
        search_terms:
          - "Merrill"
          - "first principles"
          - "problem-centered"

  # ==========================================================================
  # TIER 3: MULTIMEDIA LEARNING
