# Ed4All Workflow Definitions
# Defines available workflow types and their execution phases
#
# Phase 0 Hardening: Added retry_policy, poison_pill, and validation_gates

workflows:
  # Course Generation: Create IMSCC from objectives
  course_generation:
    description: Generate IMSCC course package from exam objectives

    # Phase 0: Retry policy configuration
    retry_policy:
      max_retries: 3
      retry_delay_seconds: [5, 30, 120]  # Exponential backoff
      transient_error_classes:
        - timeout
        - rate_limit
        - connection_error
        - service_unavailable
      permanent_error_classes:
        - validation_error
        - missing_input
        - permission_denied
        - schema_error

    # Phase 0: Poison pill detection
    poison_pill:
      threshold: 3  # N same-pattern failures stops batch
      window_seconds: 300  # 5 minute window

    phases:
      - name: planning
        agents: [course-outliner, requirements-collector]
        parallel: false
        max_concurrent: 1
        depends_on: []
        timeout_minutes: 60

      - name: content_generation
        agents: [content-generator]
        parallel: true
        max_concurrent: 10
        batch_by: week
        depends_on: [planning]
        timeout_minutes: 120
        batch_timeout_minutes: 30  # Phase 0: Per-batch timeout

        # Phase 0: Validation gates
        validation_gates:
          - gate_id: content_structure
            validator: lib.validators.content.ContentStructureValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

      - name: packaging
        agents: [brightspace-packager]
        parallel: true
        max_concurrent: 10
        batch_by: week
        depends_on: [content_generation]
        timeout_minutes: 45

        validation_gates:
          - gate_id: imscc_structure
            validator: lib.validators.imscc.IMSCCValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

          - gate_id: page_objectives
            validator: lib.validators.page_objectives.PageObjectivesValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

          # Phase 4 PoC of plans/rdf-shacl-enrichment-2026-04-26.md
          # (sub-plan: plans/phase-4-validators-to-shacl.md). Parallel
          # SHACL gate alongside the Python page_objectives gate above —
          # NOT a replacement. Severity is intentionally `warning` so
          # the Python gate stays authoritative during the PoC window
          # while the SHACL output is informational. Inputs (content_dir
          # + objectives_path) are routed via the same
          # _build_page_objectives builder.
          - gate_id: page_objectives_shacl
            validator: lib.validators.shacl_runner.PageObjectivesShaclValidator
            severity: warning
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: "Phase 4 PoC SHACL parallel of page_objectives. Informational; Python gate remains authoritative."

      - name: validation
        agents: [oscqr-course-evaluator, quality-assurance]
        parallel: true
        max_concurrent: 2
        depends_on: [packaging]
        timeout_minutes: 30

        validation_gates:
          - gate_id: wcag_compliance
            validator: DART.pdf_converter.wcag_validator.WCAGValidator
            severity: critical
            threshold:
              max_critical_issues: 0
              min_score: 0.9
            behavior:
              on_fail: block
              on_error: fail_closed

          - gate_id: oscqr_score
            validator: lib.validators.oscqr.OSCQRValidator
            severity: warning
            threshold:
              min_score: 0.7
            behavior:
              on_fail: warn
              on_error: warn

      - name: finalization
        agents: [brightspace-packager]
        parallel: false
        max_concurrent: 1
        depends_on: [validation]
        timeout_minutes: 30

  # Intake & Remediation: Import and fix existing IMSCC
  intake_remediation:
    description: Import and remediate existing IMSCC packages

    retry_policy:
      max_retries: 3
      retry_delay_seconds: [5, 30, 120]
      transient_error_classes:
        - timeout
        - rate_limit
        - connection_error
      permanent_error_classes:
        - validation_error
        - missing_input
        - corrupt_package

    poison_pill:
      threshold: 3
      window_seconds: 300

    phases:
      - name: parsing
        agents: [imscc-intake-parser]
        parallel: false
        max_concurrent: 1
        depends_on: []
        timeout_minutes: 30

        validation_gates:
          - gate_id: imscc_parse
            validator: lib.validators.imscc.IMSCCParseValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

      - name: analysis
        agents: [content-analyzer]
        parallel: false
        max_concurrent: 1
        depends_on: [parsing]
        timeout_minutes: 60

      - name: remediation
        agents:
          - dart-automation-coordinator
          - accessibility-remediation
          - content-quality-remediation
          - intelligent-design-mapper
        parallel: true
        max_concurrent: 4
        depends_on: [analysis]
        timeout_minutes: 90
        batch_timeout_minutes: 45

      - name: validation
        agents: [remediation-validator]
        parallel: false
        max_concurrent: 1
        depends_on: [remediation]
        timeout_minutes: 30

        validation_gates:
          - gate_id: wcag_compliance
            validator: DART.pdf_converter.wcag_validator.WCAGValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

      - name: packaging
        agents: [brightspace-packager]
        parallel: false
        max_concurrent: 1
        depends_on: [validation]
        timeout_minutes: 45

  # Batch DART: Multi-source synthesis document conversion
  batch_dart:
    description: Batch DART conversion using multi-source synthesis (pdftotext + pdfplumber + OCR)
    mcp_tools:
      - batch_convert_multi_source
      - validate_wcag_compliance

    retry_policy:
      max_retries: 3
      retry_delay_seconds: [10, 60, 300]
      transient_error_classes:
        - timeout
        - ocr_failure
        - memory_error
      permanent_error_classes:
        - corrupt_pdf
        - unsupported_format

    poison_pill:
      threshold: 5  # Higher threshold for batch conversion
      window_seconds: 600

    phases:
      - name: multi_source_synthesis
        agents: [dart-converter]
        parallel: true
        max_concurrent: 4
        depends_on: []
        timeout_minutes: 90
        batch_timeout_minutes: 30
        description: Synthesize accessible HTML from combined extraction sources

        # REC-CTR-06: DART markers gate ensures downstream LO-extraction + KG
        # pipelines see the expected DART semantic classes. Silently-dropped
        # markers previously degraded Trainforge/Courseforge pipelines.
        validation_gates:
          - gate_id: dart_markers
            validator: lib.validators.dart_markers.DartMarkersValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Ensure DART HTML emits skip-link, role=main, aria-labelledby sections, and DART semantic classes

      - name: validation
        agents: [accessibility-remediation]
        parallel: true
        max_concurrent: 4
        depends_on: [multi_source_synthesis]
        timeout_minutes: 30
        description: Validate WCAG 2.2 AA compliance

        validation_gates:
          - gate_id: wcag_aa_compliance
            validator: DART.pdf_converter.wcag_validator.WCAGValidator
            severity: critical
            threshold:
              max_critical_issues: 0
              min_score: 0.95
            behavior:
              on_fail: block
              on_error: fail_closed

  # RAG Training: Assessment-based training data generation
  rag_training:
    description: Train RAG on assessment data from IMSCC packages

    retry_policy:
      max_retries: 2
      retry_delay_seconds: [5, 30]
      transient_error_classes:
        - timeout
        - rate_limit
      permanent_error_classes:
        - validation_error
        - missing_content

    poison_pill:
      threshold: 3
      window_seconds: 300

    phases:
      - name: extraction
        agents: [assessment-extractor]
        parallel: false
        max_concurrent: 1
        depends_on: []
        timeout_minutes: 45

      - name: indexing
        agents: [rag-indexer]
        parallel: false
        max_concurrent: 1
        depends_on: [extraction]
        timeout_minutes: 60

      - name: assessment_generation
        agents: [assessment-generator]
        parallel: true
        max_concurrent: 5
        depends_on: [indexing]
        timeout_minutes: 90
        batch_timeout_minutes: 30

        validation_gates:
          - gate_id: assessment_quality
            validator: lib.validators.assessment.AssessmentQualityValidator
            severity: critical
            threshold:
              min_score: 0.8
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

          - gate_id: bloom_alignment
            validator: lib.validators.bloom.BloomAlignmentValidator
            severity: warning
            threshold:
              min_alignment_score: 0.7
            behavior:
              on_fail: warn
              on_error: warn

          - gate_id: leak_check
            validator: lib.validators.leak_check.LeakCheckValidator
            severity: critical
            threshold:
              max_leaks: 0
              # §4.7 corpus-wide boilerplate sub-check. Warning-only today;
              # flips to blocking in the v1.0 severity pass (VERSIONING.md §3).
              max_boilerplate_chunk_fraction: 0.10
              boilerplate_ngram_tokens: 15
            behavior:
              on_fail: block
              on_error: fail_closed

          - gate_id: outcome_ref_integrity
            validator: lib.validators.leak_check.LeakCheckValidator
            # Warning in v0.1.x — flips to `critical` in the follow-up PR
            # once mini_course_clean/ runs green per VERSIONING.md §3.
            severity: warning
            threshold:
              max_broken_refs: 0
            behavior:
              on_fail: warn
              on_error: warn

          - gate_id: content_fact_check
            validator: lib.validators.content_facts.ContentFactValidator
            severity: warning
            threshold:
              max_fact_flags: 0
            behavior:
              on_fail: warn
              on_error: warn

          - gate_id: question_quality
            validator: lib.validators.question_quality.QuestionQualityValidator
            severity: critical
            threshold:
              min_score: 0.6
            behavior:
              on_fail: block
              on_error: fail_closed

      - name: validation
        agents: [assessment-validator]
        parallel: true
        max_concurrent: 5
        depends_on: [assessment_generation]
        timeout_minutes: 30

        validation_gates:
          - gate_id: final_quality
            validator: lib.validators.assessment.FinalQualityValidator
            severity: critical
            threshold:
              min_score: 0.85
            behavior:
              on_fail: block
              on_error: fail_closed

  # Textbook to Course: Unified pipeline (DART -> Courseforge -> Trainforge)
  textbook_to_course:
    description: End-to-end textbook-to-course pipeline (DART -> Courseforge -> Trainforge)

    retry_policy:
      max_retries: 3
      retry_delay_seconds: [5, 30, 120]
      transient_error_classes:
        - timeout
        - rate_limit
        - connection_error
      permanent_error_classes:
        - validation_error
        - missing_input
        - corrupt_pdf

    poison_pill:
      threshold: 3
      window_seconds: 300

    phases:
      - name: dart_conversion
        agents: [dart-converter]
        parallel: true
        max_concurrent: 4
        depends_on: []
        timeout_minutes: 90
        description: Convert PDF textbooks to accessible HTML via multi-source synthesis

        # REC-CTR-05: Explicit parameter routing (was hardcoded in
        # MCP/core/workflow_runner.py::PHASE_PARAM_ROUTING).
        inputs_from:
          - param: course_code
            source: workflow_params
            key: course_name

        # REC-CTR-05: Explicit output keys (was hardcoded in
        # MCP/core/workflow_runner.py::PHASE_OUTPUT_KEYS).
        # Wave 32 Deliverable B: surface html_path + html_paths
        # (router canonical keys) so DartMarkersValidator gate
        # builder stops reporting ``missing inputs: html_path``.
        outputs:
          - output_path
          - output_paths
          - html_path
          - html_paths
          - success
          - html_length

        # REC-CTR-06: DART markers gate on textbook pipeline first phase.
        validation_gates:
          - gate_id: dart_markers
            validator: lib.validators.dart_markers.DartMarkersValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Ensure DART HTML emits skip-link, role=main, aria-labelledby sections, and DART semantic classes

      - name: staging
        agents: [textbook-stager]
        parallel: false
        max_concurrent: 1
        depends_on: [dart_conversion]
        timeout_minutes: 10
        description: Stage DART outputs to Courseforge inputs directory

        inputs_from:
          - param: run_id
            source: workflow_params
            key: run_id
          - param: dart_html_paths
            source: phase_outputs
            phase: dart_conversion
            output: output_paths
          - param: course_name
            source: workflow_params
            key: course_name

        outputs:
          - staging_dir
          - staged_files
          - file_count

      - name: objective_extraction
        agents: [textbook-ingestor]
        parallel: false
        max_concurrent: 1
        depends_on: [staging]
        timeout_minutes: 60
        description: Extract structure from staged DART HTML into textbook_structure.json (Wave 24)

        inputs_from:
          - param: course_name
            source: workflow_params
            key: course_name
          - param: objectives_path
            source: workflow_params
            key: objectives_path
          - param: duration_weeks
            source: workflow_params
            key: duration_weeks
          # Wave 24 HIGH-6: when --weeks is unset, auto-scale to max(8, chapters).
          - param: duration_weeks_explicit
            source: workflow_params
            key: duration_weeks_explicit
          - param: staging_dir
            source: phase_outputs
            phase: staging
            output: staging_dir

        outputs:
          - project_id
          - project_path
          - textbook_structure_path
          - chapter_count
          - duration_weeks
          - source_file_count

      - name: source_mapping
        agents: [source-router]
        parallel: false
        max_concurrent: 1
        depends_on: [objective_extraction]
        timeout_minutes: 30
        description: Map DART source blocks to Courseforge module pages (Wave 9)

        inputs_from:
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id
          - param: staging_dir
            source: phase_outputs
            phase: staging
            output: staging_dir
          - param: textbook_structure_path
            source: phase_outputs
            phase: objective_extraction
            output: textbook_structure_path

        outputs:
          - source_module_map_path
          - source_chunk_ids

      - name: course_planning
        agents: [course-outliner]
        parallel: false
        max_concurrent: 1
        depends_on: [source_mapping]
        timeout_minutes: 60
        description: Synthesize real TO/CO objectives + persist synthesized_objectives.json (Wave 24)

        inputs_from:
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id
          - param: course_name
            source: workflow_params
            key: course_name
          - param: objectives_path
            source: workflow_params
            key: objectives_path
          - param: duration_weeks
            source: workflow_params
            key: duration_weeks
          # Wave 40: route ``duration_weeks_explicit`` so the planner
          # honors the extractor's auto-scaled value in
          # ``project_config.json`` when ``--weeks`` was unset. Without
          # this, ``_plan_course_structure``'s precedence check sees
          # the default ``True`` and clobbers the auto-scaled 8 with the
          # stale routed ``duration_weeks=12`` from workflow_params.
          - param: duration_weeks_explicit
            source: workflow_params
            key: duration_weeks_explicit
          - param: source_module_map_path
            source: phase_outputs
            phase: source_mapping
            output: source_module_map_path

        outputs:
          - project_id
          - synthesized_objectives_path
          - objective_ids
          - terminal_count
          - chapter_count

      - name: content_generation
        agents: [content-generator]
        parallel: true
        max_concurrent: 10
        batch_by: week
        depends_on: [course_planning]
        timeout_minutes: 120
        batch_timeout_minutes: 30
        description: Generate course content modules
        # Phase 3 Subtask 3: legacy single-pass content_generation
        # disables itself when the new two-pass router is engaged.
        # Default off so legacy runs stay byte-stable.
        enabled_when_env: "COURSEFORGE_TWO_PASS!=true"

        inputs_from:
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id
          - param: source_module_map_path
            source: phase_outputs
            phase: source_mapping
            output: source_module_map_path
          - param: staging_dir
            source: phase_outputs
            phase: staging
            output: staging_dir
          # Wave 40: route ``duration_weeks_explicit`` for the same
          # reason as ``course_planning`` — ``_generate_course_content``
          # gates its ``project_config.duration_weeks`` precedence on
          # this flag. Pre-Wave-40 the absence of the flag in kwargs
          # let the default ``True`` clobber the auto-scaled value,
          # producing 12 week directories on a corpus that extractor
          # had auto-scaled to 8.
          - param: duration_weeks_explicit
            source: workflow_params
            key: duration_weeks_explicit

        # Wave 32 Deliverable B: add page_paths + content_dir so the
        # ContentGroundingValidator + PageObjectivesValidator gate
        # builders pick them up. Pre-Wave-32 both gates silently
        # skipped with ``missing inputs: page_paths / content_dir``.
        outputs:
          - project_id
          - content_paths
          - page_paths
          - content_dir
          - weeks_prepared

        validation_gates:
          - gate_id: content_structure
            validator: lib.validators.content.ContentStructureValidator
            severity: warning
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn

          - gate_id: source_refs
            validator: lib.validators.source_refs.PageSourceRefValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Verify every emitted sourceId resolves against the DART staging manifest (Wave 9)

          # Wave 31 — ContentGroundingValidator. Catches the "empty
          # generated course" failure mode the ``OLSR_SIM_01`` sim
          # produced: 48 weekly pages with < 80 words each, empty
          # objectives lists, and copy-pasted activity prompts. Nothing
          # caught that as "empty content" until this gate landed.
          - gate_id: content_grounding
            validator: lib.validators.content_grounding.ContentGroundingValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Verify every non-trivial paragraph in generated HTML is grounded in DART source (Wave 31)

      # Phase 3 Subtask 3: two-pass router phases. Engaged when
      # ``COURSEFORGE_TWO_PASS=true`` is set in the environment;
      # otherwise the legacy ``content_generation`` phase above runs
      # instead. The three phases form an outline -> validate -> rewrite
      # loop: outline emits Block scaffolds, inter_tier_validation
      # runs structural validators on the outline tier, rewrite emits
      # the final HTML pages.
      - name: content_generation_outline
        agents: [content-generator]
        parallel: true
        max_concurrent: 10
        batch_by: week
        depends_on: [course_planning, source_mapping, staging]
        timeout_minutes: 30
        batch_timeout_minutes: 10
        description: Phase 3 — outline-tier Block emit (terse provider, no HTML body)
        enabled_when_env: "COURSEFORGE_TWO_PASS=true"

        inputs_from:
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id
          - param: source_module_map_path
            source: phase_outputs
            phase: source_mapping
            output: source_module_map_path
          - param: staging_dir
            source: phase_outputs
            phase: staging
            output: staging_dir
          - param: duration_weeks_explicit
            source: workflow_params
            key: duration_weeks_explicit

        outputs:
          - blocks_outline_path
          - project_id
          - weeks_prepared

      - name: inter_tier_validation
        # No agent — runs Python validators only. The phase loop
        # detects ``agents: []`` + zero ``inputs_from`` LLM workers and
        # short-circuits to the validator chain.
        agents: []
        parallel: false
        max_concurrent: 1
        depends_on: [content_generation_outline]
        timeout_minutes: 5
        description: Phase 3 — run structural validators on the outline tier
        enabled_when_env: "COURSEFORGE_TWO_PASS=true"

        inputs_from:
          - param: blocks_outline_path
            source: phase_outputs
            phase: content_generation_outline
            output: blocks_outline_path
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id

        outputs:
          - blocks_validated_path
          - blocks_failed_path

        # Initially warning-severity per Phase 3 §A — promoted to
        # block in a follow-up wave once the outline-tier validators
        # have stable false-positive rates on a real corpus.
        validation_gates:
          - gate_id: outline_curie_anchoring
            validator: lib.validators.curie_anchoring.CurieAnchoringValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: Phase 3 inter-tier — verify outline-tier Blocks anchor on a CURIE per §3 (warn-only initially)

          - gate_id: outline_content_type
            validator: lib.validators.content_type.ContentTypeValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: Phase 3 inter-tier — verify outline-tier Block content_type stays in the canonical 8-value enum

          - gate_id: outline_page_objectives
            validator: lib.validators.page_objectives.PageObjectivesValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: Phase 3 inter-tier — verify outline-tier Blocks reference the page's declared objectives

          - gate_id: outline_source_refs
            validator: lib.validators.source_refs.PageSourceRefValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: Phase 3 inter-tier — verify outline-tier source_ids resolve against the DART staging manifest

      - name: content_generation_rewrite
        agents: [content-generator]
        parallel: true
        max_concurrent: 10
        batch_by: week
        depends_on: [inter_tier_validation]
        timeout_minutes: 90
        batch_timeout_minutes: 30
        description: Phase 3 — rewrite-tier HTML emit consuming validated Block outlines
        enabled_when_env: "COURSEFORGE_TWO_PASS=true"

        inputs_from:
          - param: blocks_validated_path
            source: phase_outputs
            phase: inter_tier_validation
            output: blocks_validated_path
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id
          - param: source_module_map_path
            source: phase_outputs
            phase: source_mapping
            output: source_module_map_path
          - param: staging_dir
            source: phase_outputs
            phase: staging
            output: staging_dir
          - param: duration_weeks_explicit
            source: workflow_params
            key: duration_weeks_explicit

        outputs:
          - content_paths
          - page_paths
          - content_dir
          - blocks_final_path

        validation_gates:
          # Moved from the legacy content_generation phase — the
          # rewrite tier is where final HTML grounding is verifiable.
          - gate_id: content_grounding
            validator: lib.validators.content_grounding.ContentGroundingValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Verify every non-trivial paragraph in rewrite-tier HTML is grounded in DART source (Phase 3 carry-over)

      - name: packaging
        agents: [brightspace-packager]
        parallel: false
        max_concurrent: 1
        depends_on: [content_generation]
        timeout_minutes: 45
        description: Package course as IMSCC

        inputs_from:
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id

        # Wave 32 Deliverable B: surface imscc_path + content_dir so
        # IMSCCValidator + PageObjectivesValidator builders stop
        # reporting ``missing inputs: imscc_path / content_dir``.
        outputs:
          - package_path
          - libv2_package_path
          - imscc_path
          - content_dir
          - project_id

        validation_gates:
          - gate_id: imscc_structure
            validator: lib.validators.imscc.IMSCCValidator
            severity: warning
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn

          - gate_id: page_objectives
            validator: lib.validators.page_objectives.PageObjectivesValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

          # Phase 4 PoC SHACL parallel — see textbook_to_course note above
          # in course_generation.packaging for rationale. Severity is
          # `warning` so the Python gate at this phase stays authoritative.
          - gate_id: page_objectives_shacl
            validator: lib.validators.shacl_runner.PageObjectivesShaclValidator
            severity: warning
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: "Phase 4 PoC SHACL parallel of page_objectives. Informational; Python gate remains authoritative."

      - name: trainforge_assessment
        agents: [assessment-generator]
        parallel: true
        max_concurrent: 5
        depends_on: [packaging]
        timeout_minutes: 90
        batch_timeout_minutes: 30
        description: Generate assessments from IMSCC course package
        optional: true  # Can be skipped via generate_assessments=false

        inputs_from:
          - param: course_id
            source: workflow_params
            key: course_name
          - param: imscc_path
            source: phase_outputs
            phase: packaging
            output: package_path
          - param: bloom_levels
            source: workflow_params
            key: bloom_levels
          - param: question_count
            source: workflow_params
            key: assessment_count
          # Wave 24: real TO/CO objective_ids come from course_planning
          # (previously pulled from objective_extraction, which emitted
          # phantom {COURSE}_OBJ_N placeholders).
          - param: objective_ids
            source: phase_outputs
            phase: course_planning
            output: objective_ids

        outputs:
          - output_path
          - assessments_path
          - assessment_id
          - question_count
          # Wave 24: surface chunks_path so the
          # assessment_objective_alignment gate builder can pair the
          # assessments payload with the Trainforge chunks.jsonl.
          - chunks_path

        validation_gates:
          - gate_id: imscc_input_valid
            validator: lib.validators.imscc.IMSCCValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Pre-condition - verify IMSCC from packaging phase is valid

          - gate_id: assessment_quality
            validator: lib.validators.assessment.AssessmentQualityValidator
            severity: critical
            threshold:
              min_score: 0.8
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

          # Wave 24 scope 7: fail-loud gate that keeps assessment
          # objective_ids aligned with chunk learning_outcome_refs. Before
          # Wave 24, two disjoint LO schemes coexisted; if that failure
          # mode ever resurfaces, this gate stops the pipeline before
          # 896 phantom refs land in the training corpus.
          - gate_id: assessment_objective_alignment
            validator: lib.validators.assessment_objective_alignment.AssessmentObjectiveAlignmentValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Every assessment question's objective_id must appear in at least one chunk's learning_outcome_refs (Wave 24)

      # Wave 30 Gap 3: training-pair synthesis. Pre-Wave-30,
      # Trainforge/synthesize_training.py was never wired into any
      # end-to-end run — every LibV2 course had zero SFT/DPO pairs
      # so ``ed4all export-training ... --format dpo`` had nothing
      # real to export. This phase reads the Trainforge corpus
      # produced by ``trainforge_assessment`` and emits
      # ``training_specs/instruction_pairs.jsonl`` +
      # ``training_specs/preference_pairs.jsonl``. Optional: callers
      # can skip it via ``generate_assessments=false`` (same gate
      # that skips ``trainforge_assessment``).
      - name: training_synthesis
        agents: [training-synthesizer]
        parallel: false
        max_concurrent: 1
        depends_on: [trainforge_assessment]
        timeout_minutes: 30
        description: Synthesize SFT + DPO training pairs from Trainforge chunks
        optional: true

        inputs_from:
          - param: course_code
            source: workflow_params
            key: course_name
          - param: assessments_path
            source: phase_outputs
            phase: trainforge_assessment
            output: assessments_path
          - param: chunks_path
            source: phase_outputs
            phase: trainforge_assessment
            output: chunks_path

        outputs:
          - instruction_pairs_path
          - preference_pairs_path
          - instruction_pairs_count
          - preference_pairs_count

        # Wave 91 Action C + E: pre/post-synthesis quality gates.
        # MinEdgeCount fires before training-synthesizer runs to refuse
        # synthesis on a thin upstream graph; SynthesisDiversity fires
        # after to refuse template-collapsed pair output. Both block
        # the libv2_archival phase (training_synthesis is its
        # dependency) when triggered.
        validation_gates:
          # Wave 110 / Phase D: pre-flight dispatch estimate. Warning
          # severity by default — surfaces a heads-up to operators with
          # tight Claude Max budgets but never blocks.
          - gate_id: synthesis_quota
            validator: lib.validators.synthesis_quota.SynthesisQuotaValidator
            severity: warning
            threshold:
              max_estimated_dispatches: 1500
            behavior:
              on_fail: warn
              on_error: warn
            description: Wave 110 — estimate session dispatches; warn when above ceiling

          - gate_id: min_edge_count
            validator: lib.validators.min_edge_count.MinEdgeCountValidator
            severity: critical
            threshold:
              max_critical_issues: 0
              min_edges: 100
              min_edge_types: 4
              min_concept_nodes: 50
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Wave 91 — refuse synthesis on a thin pedagogy/concept graph

          - gate_id: synthesis_diversity
            validator: lib.validators.synthesis_diversity.SynthesisDiversityValidator
            severity: critical
            threshold:
              max_critical_issues: 0
              max_top3_share: 0.6
              max_single_share: 0.35
              min_distinct_templates: 8
              min_total_pairs: 100
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Wave 91 — refuse template-collapsed instruction pair output

          # Wave 109 / Phase C: refuse synthesis output that misses any
          # property declared in the course's property manifest. No-ops
          # for courses without a manifest so legacy workflows pass.
          - gate_id: property_coverage
            validator: lib.validators.property_coverage.PropertyCoverageValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Wave 109 — refuse synthesis output missing declared properties

          # Wave 121: refuse training data containing >5% verbatim
          # spans from chunk.text. Catches the regression class flagged
          # by the 2026-04-29 smoke audit (11/20 instruction completions
          # leaked) — without this gate, a training run on leaky pairs
          # produces a memorisation-trained adapter instead of a
          # paraphrase / application model.
          - gate_id: synthesis_leakage
            validator: lib.validators.synthesis_leakage.SynthesisLeakageValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            config:
              thresholds:
                leak_rate_threshold: 0.05
                leak_span_chars: 50
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Wave 121 — refuse training pairs with >5% verbatim chunk leakage

          # Wave 135c: binary per-pair CURIE anchoring sentinel. Replaces
          # the Wave 130b curie_preservation mean-retention metric as the
          # critical-severity gate (the predecessor gate was removed in
          # Wave 135d after one wave of warning-severity transition).
          # Force-injection (Wave 135b) guarantees CURIE presence in
          # paraphrase pairs by construction; this gate fires only when
          # injection BROKE, i.e., the per-pair anchoring rate drops to
          # whatever the natural paraphrase rate is (~0.10 per the
          # 2026-05-01 audit). Default threshold pair_anchoring_rate=0.95
          # catches injector regressions loudly without false-positive on
          # natural per-pair variance. Skips deterministic generators
          # (kg_metadata.* / violation_detection.* / abstention.* /
          # schema_translation.*) since those are oracle-grounded by
          # manifest input.
          - gate_id: curie_anchoring
            validator: lib.validators.curie_anchoring.CurieAnchoringValidator
            severity: critical
            threshold:
              min_pair_anchoring_rate: 0.95
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Wave 135c — binary per-pair CURIE anchoring sentinel. Force-injection guarantees CURIE presence; this gate fails closed on injector regression.

      - name: libv2_archival
        agents: [libv2-archivist]
        parallel: false
        max_concurrent: 1
        depends_on: [packaging, trainforge_assessment, training_synthesis]
        timeout_minutes: 30
        description: Archive all pipeline artifacts to LibV2 (raw PDFs, DART HTML, IMSCC, RAG corpus)

        inputs_from:
          - param: course_name
            source: workflow_params
            key: course_name
          - param: domain
            source: workflow_params
            key: domain
          - param: division
            source: workflow_params
            key: division
          - param: pdf_paths
            source: workflow_params
            key: pdf_paths
          - param: html_paths
            source: phase_outputs
            phase: dart_conversion
            output: output_paths
          - param: imscc_path
            source: phase_outputs
            phase: packaging
            output: package_path

        outputs:
          - course_slug
          - course_dir
          - manifest_path

        # Wave 23 Sub-task C: manifest integrity gate. Previously no
        # gate ran here, so pipeline-built archives could silently
        # violate the LibV2 scaffold contract downstream consumers
        # assume (empty pedagogy/, missing course.json, checksum
        # mismatches, etc.).
        validation_gates:
          - gate_id: libv2_manifest
            validator: lib.validators.libv2_manifest.LibV2ManifestValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Validate LibV2 manifest JSON, schema, and on-disk artifact integrity

          # Wave 78: fail-closed packet integrity. Promotes the Wave 75
          # PacketIntegrityValidator from a post-hoc operator tool to a
          # blocking workflow gate. ``config.strict: true`` activates
          # both --strict-coverage (every_objective_has_teaching,
          # every_objective_has_assessment, to_has_teaching_and_assessment,
          # domain_concept_has_chunk) and --strict-typing
          # (edge_endpoint_typing). Set
          # LIBV2_RELAX_PACKET_INTEGRITY=true to downgrade these rules
          # to warnings for legacy archives that haven't been re-emit
          # with Wave 76+ pedagogy + concept typing.
          - gate_id: packet_integrity_strict
            validator: lib.validators.libv2_packet_integrity.PacketIntegrityValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            config:
              strict: true
            behavior:
              on_fail: block
              on_error: fail_closed
            description: Wave 78 — fail-closed packet integrity (coverage + typing)

          # Wave 82: silent-zero detection on the typed concept graph.
          # Closes the rdf-shacl-551 audit's load-bearing finding: 5 of 7
          # inference rules emitted zero edges with byte-identical
          # rule_versions while the pipeline reported success. Off by
          # default (TRAINFORGE_VALIDATE_RULE_OUTPUTS=true to enable);
          # warning severity so first-run corpora without a baseline
          # pass cleanly.
          - gate_id: semantic_graph_rule_output
            validator: lib.validators.semantic_graph_rule_output.SemanticGraphRuleOutputValidator
            severity: warning
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: warn
              on_error: warn
            description: Wave 82 — detect silent-zero regressions in concept_graph_semantic.json rules

          # KG-quality metric surface (improvement #4 from the post-Wave 85
          # corpus-grounded gap analysis). Computes the four KG-quality
          # dimensions (completeness, consistency, accuracy, coverage)
          # and emits kg_quality_report.json.
          #
          # Wave 91 Action D promoted thresholds off 0.0 and severity
          # from warning to critical. Baseline run on rdf-shacl-551-2
          # (empty SHACL validation report) yielded
          # completeness=1.0, consistency=1.0, accuracy=1.0,
          # coverage=0.5248. Thresholds picked at max(spec_default,
          # baseline - 0.05) so the fixture corpus passes with a small
          # margin and any genuine regression blocks the pipeline.
          # See lib/validators/kg_quality.py for full calibration notes.
          - gate_id: kg_quality_report
            validator: lib.validators.kg_quality.KGQualityValidator
            severity: critical
            threshold:
              min_completeness: 0.95
              min_consistency: 0.95
              min_accuracy: 0.95
              min_coverage: 0.5
            behavior:
              on_fail: block
              on_error: fail_closed
            description: KG-quality metric surface (completeness / consistency / accuracy / coverage)

      - name: finalization
        agents: [brightspace-packager]
        parallel: false
        max_concurrent: 1
        depends_on: [libv2_archival]
        timeout_minutes: 30
        description: Final validation and training data export

        inputs_from:
          - param: project_id
            source: phase_outputs
            phase: objective_extraction
            output: project_id
          - param: course_slug
            source: phase_outputs
            phase: libv2_archival
            output: course_slug

        outputs:
          - project_id
          - package_path
          - course_slug

  # Trainforge Train: post-import SLM adapter training (Wave 90)
  # Consumes an already-imported LibV2 course and writes
  # ``models/<model_id>/`` back into the same slug. Single-phase
  # workflow today; validation gates land in Wave 92 alongside
  # libv2_model gate wiring + import-model CLI.
  trainforge_train:
    description: Train a course-pinned adapter on a LibV2-imported course (Wave 90)

    retry_policy:
      max_retries: 1
      retry_delay_seconds: [60]
      transient_error_classes:
        - timeout
        - rate_limit
      permanent_error_classes:
        - validation_error
        - missing_input

    poison_pill:
      threshold: 2
      window_seconds: 600

    phases:
      - name: training
        agents: [training-synthesizer]
        parallel: false
        max_concurrent: 1
        depends_on: []
        timeout_minutes: 720
        description: Dispatch one training run via Trainforge.train_course

      # Wave 108 / Phase B: gate adapter promotion behind eval thresholds.
      # Reads <model_dir>/eval/eval_report.json and fails closed on
      # faithfulness regression, yes-bias, no-bias, source-match drop, or
      # baseline regression — the four gameable-eval holes Phase B closes.
      - name: post_training_validation
        agents: []
        parallel: false
        max_concurrent: 1
        depends_on: [training]
        timeout_minutes: 5
        description: Gate the trained adapter against eval thresholds before promotion
        validation_gates:
          - gate_id: eval_gating
            validator: lib.validators.eval_gating.EvalGatingValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

          # Wave 137b: cross-CURIE coupling. Reads the post-overlay
          # FORM_DATA dict + family_map.<family>.yaml; fails closed
          # when any family is partially complete (mixed complete +
          # degraded entries) so asymmetric anchoring can't reach the
          # adapter.
          - gate_id: family_completeness
            validator: lib.validators.family_completeness.FamilyCompletenessValidator
            severity: critical
            threshold:
              max_critical_issues: 0
            behavior:
              on_fail: block
              on_error: fail_closed

# Default settings applied to all workflows
defaults:
  task_timeout_minutes: 60
  retry_attempts: 2
  retry_delay_seconds: 30
  batch_timeout_minutes: 30

  # Phase 0: Default gate behaviors
  validation_gates:
    behavior:
      on_fail: block
      on_error: fail_closed

  # Phase 0: Default poison pill settings
  poison_pill:
    threshold: 3
    window_seconds: 300

# Dependency resolution configuration
dependency_resolution:
  mode: strict  # fail if dependency not met
  allow_skip: false

# Phase 0: Hardening configuration
hardening:
  enabled: true
  strict_mode: false  # Set to true for production

  # Error classification
  error_classification:
    enabled: true
    log_all_errors: true

  # Checkpointing
  checkpoints:
    enabled: true
    checkpoint_dir: state/runs/{run_id}/checkpoints

  # Validation
  validation:
    fail_closed: true
    allow_waivers: true
    waiver_min_reason_length: 20

  # ==========================================================================
  # Phase 0.5 Enhancements - All flags default FALSE for backwards compat
  # ==========================================================================

  # Enforcement Flags (opt-in)
  enforcement:
    enforce_write_facade: false      # Route all writes through WriteFacade
    enforce_finalization: false      # Require finalization before close
    verify_hash_chain_on_close: false  # Verify hash chains on finalize
    generate_run_checksums: false    # Generate checksums for all artifacts
    run_finalization_required: false # Block run close without finalization

  # Concurrency Settings
  concurrency:
    lock_timeout_seconds: 30         # Max wait for lock acquisition
    lock_retry_count: 3              # Number of retry attempts
    lock_retry_backoff:              # Exponential backoff delays (seconds)
      - 0.1
      - 0.5
      - 2.0
    max_parallel_tasks: 10           # Max concurrent tasks per batch
    use_file_locking: true           # Use fcntl file locking
    atomic_write_strategy: temp_rename  # temp_rename | direct

  # Path Security
  path_security:
    max_path_length: 4096            # Maximum path length
    disallow_absolute_paths: true    # Reject absolute paths in inputs
    disallow_parent_traversal: true  # Reject .. in paths

  # Environment Capture
  environment:
    env_capture_mode: allowlist      # allowlist | hash_only | none
    env_allowlist:                   # Patterns to capture
      - "ED4ALL_*"
      - PATH
      - HOME
      - USER
      - SHELL
      - LANG
      - LC_*
    env_deny_patterns:               # Patterns to always exclude
      - KEY
      - TOKEN
      - SECRET
      - PASSWORD
      - CREDENTIAL
      - PRIVATE
      - API_KEY
    max_env_vars_captured: 50        # Safety limit

  # Registry & Schema
  registry:
    registry_schema_version: "1.0.0"
    required_tools: []               # Tools that must be registered
    strict_signature_match: false    # Require exact signature match

  # Phase 0.5 Features (opt-in)
  phase_05:
    enable_deterministic_replay: false  # Enable ReplayEngine
    enable_artifact_dedup: false        # Enable content-addressed dedup
    ci_integrity_test_enabled: false    # Enable CI integrity hook
