family: rdf_shacl
# Wave 133c: declare the SHACL validation surface so the violation_generator
# (pyshacl-oracle-verified) opts in. Future non-SHACL course families omit
# this field to gate the SHACL-specific violation pairs off.
validation_kind: shacl
# Wave 132d: explicit persona for the rdf-shacl-* course family. Threaded
# into Trainforge.synthesize_training._INSTRUCTION_PROMPT_FRAMES variant 1
# so the persona prefix matches the course's actual learner. Pre-Wave-132d
# the prefix was hardcoded "For an RDF/SHACL learner, " inside the frame
# template — wrong for any non-SHACL course.
learner_persona: "an RDF/SHACL learner"
description: |
  RDF/SHACL surface forms every rdf-shacl-* course's SLM adapter must
  teach. Coverage and per-property accuracy gates fail closed below the
  floors below.

  Wave 109 / Phase C: established the manifest with 6 anchor CURIEs.
  Wave 130a: expanded to 40 CURIEs (audit-recommended + corpus-attested)
  per plans/curie-fidelity-audit-2026-05/audit_report.md. The audit
  measured mean retention 10% / 55% zero-retention because Wave 120's
  preserve-retry mechanism was correct but enforced preservation only
  over the 6 declared anchors; non-manifest schema vocabulary
  (sh:minCount, sh:path, rdf:type, xsd:date, foaf:Person, owl:disjointWith,
  rdfs:domain/range, etc.) was never required and 14B-Q4 paraphrase
  routinely strips it. Floors are scaled to corpus frequency tier:
  high-freq (>50 chunks) -> 5, mid (10-50) -> 3, low (2-10) -> 2.

properties:
  # ----- SHACL anchors (Wave 109) -----
  - id: sh_datatype
    uri: http://www.w3.org/ns/shacl#datatype
    curie: sh:datatype
    label: SHACL datatype constraint
    surface_forms:
      - "sh:datatype"
      - "<http://www.w3.org/ns/shacl#datatype>"
    min_pairs: 8
    min_accuracy: 0.40

  - id: sh_class
    uri: http://www.w3.org/ns/shacl#class
    curie: sh:class
    label: SHACL class constraint
    surface_forms:
      - "sh:class"
      - "<http://www.w3.org/ns/shacl#class>"
    min_pairs: 8
    min_accuracy: 0.40

  - id: sh_nodeshape
    uri: http://www.w3.org/ns/shacl#NodeShape
    curie: sh:NodeShape
    label: SHACL node shape declaration
    surface_forms:
      - "sh:NodeShape"
      - "<http://www.w3.org/ns/shacl#NodeShape>"
    min_pairs: 8
    min_accuracy: 0.40

  - id: sh_propertyshape
    uri: http://www.w3.org/ns/shacl#PropertyShape
    curie: sh:PropertyShape
    label: SHACL property shape declaration
    surface_forms:
      - "sh:PropertyShape"
      - "<http://www.w3.org/ns/shacl#PropertyShape>"
    # Wave 118: lowered from 8 to 5 to match corpus reality. The
    # rdf-shacl-551-2 corpus (audited 2026-04-28) only contains 5
    # chunks with the sh:PropertyShape surface form; floor=5 keeps
    # a regression-detection floor while letting a clean full-corpus
    # rebuild pass the gate. Other 5 properties retain min_pairs=8
    # because the corpus has 18-66 chunks with each of their forms.
    min_pairs: 5
    min_accuracy: 0.40

  - id: rdfs_subclassof
    uri: http://www.w3.org/2000/01/rdf-schema#subClassOf
    curie: rdfs:subClassOf
    label: RDFS subclass-of relation
    surface_forms:
      - "rdfs:subClassOf"
      - "<http://www.w3.org/2000/01/rdf-schema#subClassOf>"
    min_pairs: 8
